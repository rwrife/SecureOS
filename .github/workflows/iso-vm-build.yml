name: ISO Build And VM Smoke Test

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-iso-vm-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure build scripts are executable
        run: |
          find build/scripts -type f -name "*.sh" -exec chmod +x {} +
          find scripts -maxdepth 1 -type f -name "*.sh" -exec chmod +x {} +

      - name: Build pinned toolchain image
        run: |
          docker build \
            -f build/docker/Dockerfile.toolchain \
            -t secureos/toolchain:bookworm-2026-02-12 \
            .

      - name: Install host-side VM dependencies
        # qemu runs on the host (needs /dev/kvm), python3 is used by the
        # determinism check below. The kernel toolchain lives in the Docker
        # toolchain image built above (issue #332).
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 python3

      - name: Build kernel ISO
        # `image` was renamed to `kernel` in the docker-toolchain
        # consolidation; route through the host-side wrapper.
        run: ./scripts/build.sh kernel

      - name: Build seeded disk image
        run: ./scripts/build.sh disk

      - name: Reclaim artifact ownership for host steps
        # scripts/build.sh attempts chmod -R a+rwX on artifacts/ but can't
        # chown root-created files. Use sudo on the runner to give the
        # subsequent host-side qemu run write access to artifacts/qemu/.
        if: always()
        run: |
          sudo chown -R "$USER" artifacts || true
          chmod -R u+rwX artifacts || true

      - name: VM smoke boot (kernel console)
        run: ./build/scripts/run_qemu.sh --test kernel_console

      - name: Publish ISO to GitHub Release (tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/kernel/secureos.iso
          generate_release_notes: true

      - name: Upload kernel artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-artifacts
          path: artifacts/kernel/
          if-no-files-found: error

      - name: Upload disk artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: disk-artifacts
          path: artifacts/disk/
          if-no-files-found: warn

      - name: Upload qemu artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-artifacts
          path: artifacts/qemu/
          if-no-files-found: warn

      # Run the determinism check AFTER artifact uploads. The script
      # rebuilds the image from a clean tree (rm -rf artifacts/kernel
      # artifacts/disk ...), so running it earlier wipes the kernel ISO
      # before "Upload kernel artifacts" can publish it.
      - name: Image determinism check (baseline; non-blocking, #174)
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD":/workspace -w /workspace \
            secureos/toolchain:bookworm-2026-02-12 \
            bash -lc 'set -euo pipefail; git config --global --add safe.directory /workspace; ./build/scripts/check_image_determinism.sh'

      - name: Upload determinism run bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runs-artifacts
          path: artifacts/runs/
          if-no-files-found: warn
