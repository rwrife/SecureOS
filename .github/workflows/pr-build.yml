name: PR Build Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # validate_abi_stamps (#297) walks `git log -- docs/abi/*.md`
          # to find the most-recent content-changing commit per file.
          # On a shallow checkout (the actions/checkout@v4 default of
          # fetch-depth: 1) `git log` only sees the synthetic PR merge
          # commit, which makes every file appear to have been created
          # in that single commit and the validator wrongly reports
          # `last_content=<merge-sha>` newer than every stamp. Fetch full
          # history so freshness comparisons are accurate.
          fetch-depth: 0

      - name: Init submodules (full-depth)
        # See iso-vm-build.yml: checkout@v4's `submodules: recursive`
        # uses --depth=1, which fails against bearssl.org (server only
        # advertises tip, not pinned commits). A plain `git submodule
        # update --init --recursive` does a full clone and resolves the
        # pinned SHAs. Pre-emptive for #408 Phase 3 (TinyCC freestanding
        # port will compile under vendor/tinycc/tinycc/); BearSSL already
        # builds via its Makefile.secureos shim. Refs #520.
        run: git submodule update --init --recursive

      - name: Ensure build scripts are executable
        # Defensive: mirrors the same step in iso-vm-build.yml.
        # Several validator scripts have repeatedly landed on `main`
        # without the `+x` bit (see #90 / #91 / #101), which makes
        # `build/scripts/test.sh` print a wall of `Permission denied`
        # before the harness can emit a parseable `TEST:FAIL:` marker.
        # Restoring the bit here unblocks every PR even if a future
        # commit drops it again, and complements the dispatch-time
        # `bash <path>` fallback tracked under #91.
        run: |
          find build/scripts -type f -name "*.sh" -exec chmod +x {} +
          find scripts -maxdepth 1 -type f -name "*.sh" -exec chmod +x {} +
          find tools -type f \( -name "*.sh" -o -name "sof_wrap" \) -exec chmod +x {} + 2>/dev/null || true

      - name: Build pinned toolchain image
        run: |
          docker build \
            -f build/docker/Dockerfile.toolchain \
            -t secureos/toolchain:bookworm-2026-02-12 \
            .

      - name: Install host-side runtime dependencies
        # QEMU + python3-jsonschema run on the host (qemu needs /dev/kvm,
        # jsonschema is invoked by the host-side validate_manifests.sh).
        # The kernel toolchain (clang/lld/nasm/etc.) lives in the Docker
        # toolchain image built above — see issue #332 for why we no longer
        # apt-install those on the bare runner.
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 python3-jsonschema

      - name: Manifest schema validate (issue #195, #227)
        # Re-validates every in-tree app manifest under manifests/examples/
        # against manifests/schema/v0.json on every PR so the schema and the
        # worked examples cannot silently drift (BUILD_ROADMAP §7 / #187).
        # Also cross-checks each manifest's os_abi_version against the
        # OS_ABI_VERSION_MAJOR constant in user/include/secureos_abi.h
        # (issue #227) so a header bump fails CI on stale examples
        # rather than at runtime in the launcher.
        # Runs through the same .sh wrapper invoked locally so behavior is
        # identical in CI and on a contributor's box.
        run: ./build/scripts/validate_manifests.sh --require-abi-major-from-header user/include/secureos_abi.h

      - name: Kernel entry build
        # Go through the host-side wrapper which docker-runs the
        # container-internal build.sh. The bare runner no longer has
        # clang/lld/nasm installed (issue #332).
        run: ./scripts/build.sh kernel

      - name: Reclaim artifact ownership for host steps
        # scripts/build.sh attempts chmod -R a+rwX on artifacts/ but can't
        # chown root-created files inside the container. sudo on the
        # runner restores ownership so subsequent host-side steps that
        # write under artifacts/ work.
        if: always()
        run: |
          sudo chown -R "$USER" artifacts || true
          chmod -R u+rwX artifacts || true

      - name: Full validation bundle (machine-readable)
        # validate_bundle.sh is a container-internal script (it shells out to
        # clang via the per-target test_*.sh harnesses). Run it inside the
        # toolchain image; bind-mount the workspace so artifacts land back
        # on the host for the upload-artifact steps below.
        #
        # The toolchain container runs as root; the bind-mounted /workspace
        # is owned by the runner UID, which trips git's safe.directory check.
        # Mark it safe inside the container before any git-using validator.
        run: |
          docker run --rm \
            -v "$PWD":/workspace -w /workspace \
            secureos/toolchain:bookworm-2026-02-12 \
            bash -lc 'set -euo pipefail; git config --global --add safe.directory /workspace; ./build/scripts/validate_bundle.sh'

      - name: Capability matrix harness (non-blocking, nightly intent)
        # Issue #151 / BUILD_ROADMAP §6.1 nightly + §6.2.
        # Initially advisory: continue-on-error keeps this from deepening the
        # current PR-red posture while the matrix cells stabilize. Flip to
        # required once cell coverage and signal are trusted.
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD":/workspace -w /workspace \
            secureos/toolchain:bookworm-2026-02-12 \
            bash -lc 'set -euo pipefail; git config --global --add safe.directory /workspace; ./build/scripts/test_matrix.sh'

      - name: Upload kernel artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-artifacts
          path: artifacts/kernel/
          if-no-files-found: warn

      - name: Upload qemu artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-artifacts
          path: artifacts/qemu/
          if-no-files-found: warn

      - name: Upload validation run bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-run-bundles
          path: artifacts/runs/
          if-no-files-found: warn
