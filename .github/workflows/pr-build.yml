name: PR Build Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure build scripts are executable
        # Defensive: mirrors the same step in iso-vm-build.yml.
        # Several validator scripts have repeatedly landed on `main`
        # without the `+x` bit (see #90 / #91 / #101), which makes
        # `build/scripts/test.sh` print a wall of `Permission denied`
        # before the harness can emit a parseable `TEST:FAIL:` marker.
        # Restoring the bit here unblocks every PR even if a future
        # commit drops it again, and complements the dispatch-time
        # `bash <path>` fallback tracked under #91.
        run: |
          find build/scripts -type f -name "*.sh" -exec chmod +x {} +
          find tools -type f \( -name "*.sh" -o -name "sof_wrap" \) -exec chmod +x {} + 2>/dev/null || true

      - name: Build pinned toolchain image
        run: |
          docker build \
            -f build/docker/Dockerfile.toolchain \
            -t secureos/toolchain:bookworm-2026-02-12 \
            .

      - name: Install runtime test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm qemu-system-x86 python3-jsonschema

      - name: Manifest schema validate (issue #195)
        # Re-validates every in-tree app manifest under manifests/examples/
        # against manifests/schema/v0.json on every PR so the schema and the
        # worked examples cannot silently drift (BUILD_ROADMAP §7 / #187).
        # Runs through the same .sh wrapper invoked locally so behavior is
        # identical in CI and on a contributor's box.
        run: ./build/scripts/validate_manifests.sh

      - name: Kernel entry build
        run: ./build/scripts/build.sh kernel

      - name: Full validation bundle (machine-readable)
        run: ./build/scripts/validate_bundle.sh

      - name: Capability matrix harness (non-blocking, nightly intent)
        # Issue #151 / BUILD_ROADMAP §6.1 nightly + §6.2.
        # Initially advisory: continue-on-error keeps this from deepening the
        # current PR-red posture while the matrix cells stabilize. Flip to
        # required once cell coverage and signal are trusted.
        continue-on-error: true
        run: ./build/scripts/test_matrix.sh

      - name: Upload kernel artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-artifacts
          path: artifacts/kernel/
          if-no-files-found: warn

      - name: Upload qemu artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-artifacts
          path: artifacts/qemu/
          if-no-files-found: warn

      - name: Upload validation run bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-run-bundles
          path: artifacts/runs/
          if-no-files-found: warn
