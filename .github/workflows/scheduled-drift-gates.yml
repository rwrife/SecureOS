name: Scheduled Drift Gates

on:
  workflow_dispatch:
  schedule:
    # Weekly cadence requested in issue #622: Monday 12:00 UTC,
    # before the Monday daily-review cron.
    - cron: "0 12 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  scheduled-drift-gates:
    # Observability-only guardrail on main branch health; this workflow
    # intentionally does not run on pull_request and does not gate PR merges.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # validate_abi_stamps.sh shells out to git log per file and requires
          # complete history (it fails hard on shallow clones).
          fetch-depth: 0
          submodules: recursive

      - name: Init submodules (full-depth sync)
        # Keep an explicit sync step so pinned submodule SHAs are available even
        # if checkout behavior changes; issue #524 guards this contract.
        run: git submodule update --init --recursive

      - name: Ensure build scripts are executable
        # Defensive chmod (same rationale as lint.yml / pr-build.yml).
        run: |
          find build/scripts -type f -name "*.sh" -exec chmod +x {} +

      - name: Install lint tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              clang-format \
              shellcheck

      - name: Run lint
        env:
          LINT_REQUIRE_TOOLS: "1"
          LINT_CLANG_FORMAT_FATAL: "0"
        run: bash build/scripts/lint.sh

      - name: Run host drift validators
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash build/scripts/validate_abi_stamps.sh
          bash build/scripts/validate_m7_markers.sh
          bash build/scripts/validate_manifests.sh
          bash build/scripts/validate_capability_registry.sh
          bash build/scripts/validate_sosh_capability_contract.sh
          bash build/scripts/validate_sdk_no_kernel_includes.sh

      - name: Update rolling failure issue
        if: ${{ failure() }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "ci(drift): scheduled-drift-gate failure on main — auto-updated";
            const marker = "<!-- scheduled-drift-gates-rolling-issue -->";
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const branch = context.ref.replace("refs/heads/", "");
            const sha = context.sha.slice(0, 7);
            const entry = `- ${new Date().toISOString()} — [run #${context.runNumber}](${runUrl}) on \`${branch}\` @ \`${sha}\``;

            const allOpenIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const rolling = allOpenIssues.find((issue) => issue.title === title && !issue.pull_request);

            const header = [
              marker,
              "This issue is auto-maintained by `.github/workflows/scheduled-drift-gates.yml`.",
              "It tracks failing scheduled/dispatch drift-gate runs on `main`.",
              "",
              "## Recent failing runs",
            ].join("\n");

            const extractEntries = (body) =>
              body
                .split("\n")
                .map((line) => line.trim())
                .filter((line) => line.startsWith("- "));

            if (!rolling) {
              const body = `${header}\n${entry}`;
              const created = await github.rest.issues.create({ owner, repo, title, body });
              core.info(`Created rolling issue #${created.data.number}`);
              return;
            }

            const priorBody = rolling.body || "";
            const existingEntries = extractEntries(priorBody);
            const withNewestFirst = [entry, ...existingEntries];
            const deduped = [];
            for (const line of withNewestFirst) {
              if (!deduped.includes(line)) deduped.push(line);
            }
            const trimmed = deduped.slice(0, 25);
            const body = `${header}\n${trimmed.join("\n")}`;

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: rolling.number,
              body,
            });
            core.info(`Updated rolling issue #${rolling.number}`);
